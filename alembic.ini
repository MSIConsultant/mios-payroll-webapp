# Alembic Configuration

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be named with an upward counter
# file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to datetime.datetime.now(datetime.timezone(datetime.timedelta(seconds=tz_offset)))
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field when generating a migration file
# name.  The default value is 40
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to ignore whitespace-only diffs when
# detecting new revisions
# ignore_whitespace = false

# set to 'true' to detect tower documents
# and translate them into an appropriate
# form of dialect-specific comment syntax before
# they can be operated upon by Alembic
# detect_tower_documents = false

# When set to "each", Alembic will attempt to rewrite
# INSERT and UPDATE statements as single-row, case-sensitive statements
# because not all databases are case sensitive, the default is "quoted"
compare_type = false
compare_server_default = false

; Do not hardcode production credentials here. Provide DATABASE_URL via environment and let alembic/env.py read it.
; Example placeholder (commented out):
; sqlalchemy.url = postgresql://payroll_user:payroll_password@localhost:5432/payroll_db

; Recommended: set DATABASE_URL in the environment and ensure alembic/env.py uses os.getenv('DATABASE_URL')


[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
